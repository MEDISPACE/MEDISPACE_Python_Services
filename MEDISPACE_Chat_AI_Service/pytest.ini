[pytest]
# MEDISPACE Chat AI Service — Test Configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings
addopts =
    -v
    --tb=short
    --no-header

# pytest-asyncio: tự động handle async test functions
asyncio_mode = auto

# Encoding
log_cli = false
