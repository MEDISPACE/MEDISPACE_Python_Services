name: Python Services Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ── CI: Lint ──────────────────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check MEDISPACE_OCR_Service MEDISPACE_ML_Service

  # ── Build & Push OCR + ML ─────────────────────────────────────────────────
  build-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: ocr-service
            context: ./MEDISPACE_OCR_Service
            dockerfile: ./MEDISPACE_OCR_Service/Dockerfile
          - service: ml-service
            context: ./MEDISPACE_ML_Service
            dockerfile: ./MEDISPACE_ML_Service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger deploy (deploy.yml in BE repo) ────────────────────────────
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: nhthongdev/MEDISPACE_ECommerce_BE
          event-type: deploy
          client-payload: '{"service": "${{ matrix.service }}", "image_tag": "${{ github.sha }}"}'
