name: Python Services Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  # ── CI: Lint ──────────────────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check MEDISPACE_OCR_Service MEDISPACE_ML_Service

  # ── Build & Push OCR + ML (parallel) ──────────────────────────────────────
  build-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: ocr-service
            image: medispace-ocr
            context: ./MEDISPACE_OCR_Service
            dockerfile: ./MEDISPACE_OCR_Service/Dockerfile
          - service: ml-service
            image: medispace-ml
            context: ./MEDISPACE_ML_Service
            dockerfile: ./MEDISPACE_ML_Service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger deploy (deploy.yml in BE repo) ────────────────────────────
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: MEDISPACE/MEDISPACE_ECommerce_BE
          event-type: deploy
          client-payload: '{"service": "${{ matrix.service }}", "image_tag": "${{ github.sha }}"}'
